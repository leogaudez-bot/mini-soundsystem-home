  <text x="120" y="210" fill="#5E5D59" font-size="24" font-family="Arial, sans-serif">Plan vectoriel de principe • vue éclatée • logique modulaire</text>

  <g transform="translate(230 300)">
    <rect x="390" y="0" width="220" height="170" rx="28" fill="#2A2826" stroke="#C96442" stroke-opacity="0.65" stroke-width="2"/>
