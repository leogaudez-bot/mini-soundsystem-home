  <g fill="#171717" font-family="Arial, sans-serif">
    <text x="1030" y="375" font-size="22" font-weight="700">Top detail module</text>
    <text x="1030" y="406" font-size="18" fill="#5E5D59">Small housing for the high register and visual signature.</text>

    <text x="1030" y="655" font-size="22" font-weight="700">Middle impact module</text>
    <text x="1030" y="686" font-size="18" fill="#5E5D59">Main rhythmic body, proportionally central in the composition.</text>

    <text x="1030" y="1000" font-size="22" font-weight="700">Base foundation module</text>
    <text x="1030" y="1031" font-size="18" fill="#5E5D59">Lowest cabinet, visually stable and easiest to anchor in a room.</text>
