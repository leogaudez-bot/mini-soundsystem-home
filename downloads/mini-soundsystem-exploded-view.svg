    <text x="500" y="540" fill="#F5F4ED" font-size="22" font-family="Arial, sans-serif" text-anchor="middle" letter-spacing="5">KICK</text>

    <rect x="180" y="760" width="640" height="380" rx="38" fill="#171717" stroke="#F5F4ED" stroke-opacity="0.14" stroke-width="2"/>
