    <circle cx="500" cy="950" r="80" fill="#F5F4ED" fill-opacity="0.05" stroke="#F5F4ED" stroke-opacity="0.16" stroke-width="2"/>
    <text x="500" y="1098" fill="#F5F4ED" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" letter-spacing="6">SUB</text>

    <g stroke="#171717" stroke-opacity="0.22" stroke-width="3" stroke-dasharray="12 10">
      <line x1="500" y1="190" x2="500" y2="270"/>
      <line x1="500" y1="610" x2="500" y2="720"/>
    </g>

    <g fill="#C96442" fill-opacity="0.12" stroke="#C96442" stroke-opacity="0.5" stroke-width="2">
